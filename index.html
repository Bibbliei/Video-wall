<script>
    const viewID = "Q47DN9T";
    const password = "12345";
    
    const params = new URLSearchParams(window.location.search);
    const x = parseInt(params.get('x')) || 0;
    const y = parseInt(params.get('y')) || 0;
    const cols = 3;
    const rows = 3;

    document.getElementById('coord-display').innerText = `${x},${y}`;

    function launchTile() {
        const iframe = document.getElementById('vdo-stream');
        const overlay = document.getElementById('overlay');
        const docEl = document.documentElement;

        // 1. Force focus to the window first
        window.focus();

        // 2. Wrap the fullscreen request in a tiny delay
        // This helps 'QR-to-Browser' handoffs register the gesture correctly
        setTimeout(() => {
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen().catch(err => {
                    console.log("Fullscreen failed, trying reload fix.");
                });
            } else if (docEl.webkitRequestFullscreen) {
                docEl.webkitRequestFullscreen(); // Safari/iOS
            }
        }, 100);

        // 3. Set the VDO.ninja source
        const vdoUrl = `https://vdo.ninja/?view=${viewID}&pw=${password}&autoplay=1&mute=1&cleanoutput=1&transparent=1&buffer=0&cover=1&scale=100`;
        
        iframe.src = vdoUrl;
        iframe.style.display = "block";
        overlay.style.display = "none";

        // 4. Mapping Logic
        iframe.style.width = (cols * 100) + "vw";
        iframe.style.height = (rows * 100) + "vh";
        
        const moveX = -(x * 100);
        const moveY = -(y * 100);
        iframe.style.transform = `translate3d(${moveX}vw, ${moveY}vh, 0)`;
    }
</script>
