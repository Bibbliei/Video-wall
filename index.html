<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Wall Tile</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background-color: #000; 
            width: 100%; height: 100%;
        }
        
        #container {
            width: 100vw; height: 100vh;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        iframe {
            position: absolute;
            border: none;
            display: none;
            /* Force the video to fill the area regardless of aspect ratio */
            object-fit: cover !important; 
            width: 300vw;
            height: 300vh;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-family: sans-serif;
            cursor: pointer;
        }
        .btn {
            border: 2px solid #fff;
            padding: 20px 40px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="launchTile()">
        <div class="btn">Start Tile [<span id="coord-display">0,0</span>]</div>
    </div>

    <div id="container">
        <iframe id="vdo-stream" allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        const viewID = "Q47DN9T";
        const password = "12345";
        
        const params = new URLSearchParams(window.location.search);
        const x = parseInt(params.get('x')) || 0;
        const y = parseInt(params.get('y')) || 0;
        const cols = 3;
        const rows = 3;

        document.getElementById('coord-display').innerText = `${x},${y}`;

        function launchTile() {
            const iframe = document.getElementById('vdo-stream');
            const overlay = document.getElementById('overlay');
            const container = document.getElementById('container');

            // 1. Request Fullscreen (Hides Address Bar on Android)
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen(); // Safari
            }

            // 2. Build URL with &cover=1 to remove internal VDO.ninja black bars
            const vdoUrl = `https://vdo.ninja/?view=${viewID}&pw=${password}&autoplay=1&mute=1&cleanoutput=1&transparent=1&buffer=0&cover=1`;
            
            iframe.src = vdoUrl;
            iframe.style.display = "block";
            overlay.style.display = "none";

            // 3. Mapping Logic
            iframe.style.width = (cols * 100) + "vw";
            iframe.style.height = (rows * 100) + "vh";
            
            const moveX = -(x * 100);
            const moveY = -(y * 100);
            iframe.style.transform = `translate(${moveX}vw, ${moveY}vh)`;
        }
    </script>
</body>
</html>
