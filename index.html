<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Wall Tile</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background-color: #000; 
            width: 100%; height: 100%;
        }
        
        #container {
            width: 100vw; height: 100vh;
            position: relative;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            border: none;
            display: none; /* Stays hidden until user interaction */
            /* object-fit: cover ensures the 16:9 video fills your phone's screen shape */
            object-fit: cover; 
        }

        /* The Button Overlay - Required for Mobile Safari/Chrome */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            cursor: pointer;
        }
        .btn {
            border: 2px solid #fff;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="launchTile()">
        <div class="btn">START TILE [<span id="coord-display">0,0</span>]</div>
    </div>

    <div id="container">
        <iframe id="vdo-stream" allow="autoplay; fullscreen; microphone"></iframe>
    </div>

    <script>
        // Data from your update
        const viewID = "Q47DN9T";
        const password = "12345";
        
        // Read mapping from URL
        const params = new URLSearchParams(window.location.search);
        const x = parseInt(params.get('x')) || 0;
        const y = parseInt(params.get('y')) || 0;
        const cols = parseInt(params.get('cols')) || 3;
        const rows = parseInt(params.get('rows')) || 3;

        document.getElementById('coord-display').innerText = `${x},${y}`;

        function launchTile() {
            const iframe = document.getElementById('vdo-stream');
            const overlay = document.getElementById('overlay');
            
            // Build VDO URL: Added &mute=1 and &buffer=0 for mobile synchronisation
            const vdoUrl = `https://vdo.ninja/?view=${viewID}&pw=${password}&autoplay=1&mute=1&cleanoutput=1&transparent=1&buffer=0`;
            
            iframe.src = vdoUrl;
            iframe.style.display = "block";
            overlay.style.display = "none";

            // Mapping Logic
            // Scale the iframe to 300% (for 3 cols/rows)
            iframe.style.width = (cols * 100) + "vw";
            iframe.style.height = (rows * 100) + "vh";
            
            // Shift the view to the correct coordinate
            const moveX = -(x * 100);
            const moveY = -(y * 100);
            iframe.style.transform = `translate(${moveX}vw, ${moveY}vh)`;
        }
    </script>
</body>
</html>
